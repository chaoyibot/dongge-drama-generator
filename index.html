<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>东哥短剧生成器 - AI驱动</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      text-align: center;
      padding: 30px 0;
    }
    header h1 {
      font-size: 2.2em;
      background: linear-gradient(90deg, #f093fb, #f5576c, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    header p {
      color: #aaa;
      font-size: 1em;
    }
    
    /* 步骤指示器 */
    .steps {
      display: flex;
      justify-content: space-between;
      margin: 30px 0;
      position: relative;
    }
    .steps::before {
      content: '';
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255,255,255,0.1);
      z-index: 0;
    }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }
    .step-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      font-weight: bold;
      transition: all 0.3s;
    }
    .step.active .step-circle {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      box-shadow: 0 0 20px rgba(245, 87, 108, 0.5);
    }
    .step.completed .step-circle {
      background: #4CAF50;
    }
    .step-label {
      font-size: 0.85em;
      color: #aaa;
    }
    .step.active .step-label {
      color: #fff;
    }
    
    /* 内容区域 */
    .section {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      display: none;
    }
    .section.active {
      display: block;
    }
    .section h2 {
      font-size: 1.4em;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    /* 表单元素 */
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.2);
      color: #fff;
      font-size: 1em;
    }
    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #f5576c;
    }
    
    /* 按钮 */
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: #fff;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    
    /* 进度条 */
    .progress-container {
      margin: 20px 0;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-bar {
      height: 20px;
      background: linear-gradient(90deg, #f093fb, #f5576c);
      width: 0%;
      transition: width 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8em;
    }
    
    /* 角色卡片 */
    .character-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .character-card {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .character-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .character-card h3 {
      margin-bottom: 8px;
    }
    .character-card p {
      color: #aaa;
      font-size: 0.9em;
    }
    
    /* 场景网格 */
    .scene-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .scene-card {
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .scene-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }
    .scene-card .info {
      padding: 12px;
    }
    .scene-card .status {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75em;
    }
    .scene-card .status.pending { color: #ff9800; }
    .scene-card .status.complete { color: #4CAF50; }
    
    /* 日志区域 */
    .log-area {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 16px;
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.85em;
      line-height: 1.5;
    }
    .log-entry {
      margin-bottom: 4px;
    }
    .log-entry.info { color: #2196F3; }
    .log-entry.success { color: #4CAF50; }
    .log-entry.error { color: #f44336; }
    .log-entry.warning { color: #ff9800; }
    
    /* 响应式 */
    @media (max-width: 768px) {
      header h1 { font-size: 1.6em; }
      .steps { flex-wrap: wrap; gap: 10px; }
      .step { flex: 1; min-width: 60px; }
      .character-grid, .scene-grid { grid-template-columns: 1fr; }
      .btn { width: 100%; margin-right: 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎬 东哥短剧生成器</h1>
      <p>只需确定主题，AI自动完成全流程</p>
    </header>

    <!-- 步骤指示器 -->
    <div class="steps">
      <div class="step active" data-step="1">
        <div class="step-circle">1</div>
        <div class="step-label">主题</div>
      </div>
      <div class="step" data-step="2">
        <div class="step-circle">2</div>
        <div class="step-label">剧本</div>
      </div>
      <div class="step" data-step="3">
        <div class="step-circle">3</div>
        <div class="step-label">角色</div>
      </div>
      <div class="step" data-step="4">
        <div class="step-circle">4</div>
        <div class="step-label">场景</div>
      </div>
      <div class="step" data-step="5">
        <div class="step-circle">5</div>
        <div class="step-label">视频</div>
      </div>
      <div class="step" data-step="6">
        <div class="step-circle">6</div>
        <div class="step-label">成片</div>
      </div>
    </div>

    <!-- Step 1: 主题确认 -->
    <section id="step1" class="section active">
      <h2>📝 Step 1: 确认主题方向</h2>
      <p>只需告诉我你想做什么类型的短剧，剩下的交给AI！</p>
      <div class="form-group">
        <label>题材类型</label>
        <select id="genre">
          <option value="urban_fantasy">都市奇幻</option>
          <option value="rebirth">重生爽文</option>
          <option value="ceo_romance">霸总甜宠</option>
          <option value="suspense">悬疑推理</option>
          <option value="cartoon" selected>3D卡通动画</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div class="form-group">
        <label>故事方向（一句话描述即可）</label>
        <input type="text" id="story_direction" placeholder="例如：森林里的动物们对抗伐木工的故事">
      </div>
      <button class="btn btn-primary" onclick="startGeneration()">开始生成</button>
    </section>

    <!-- Step 2: 剧本生成 -->
    <section id="step2" class="section">
      <h2>📖 Step 2: AI生成剧本</h2>
      <div class="progress-container">
        <div class="progress-bar" id="script_progress">0%</div>
      </div>
      <div class="log-area" id="script_log"></div>
      <button class="btn btn-secondary" onclick="confirmScript()" id="btn_confirm_script" style="display: none;">确认剧本</button>
    </section>

    <!-- Step 3: 角色设定 -->
    <section id="step3" class="section">
      <h2>🎭 Step 3: AI生成角色设定</h2>
      <div class="progress-container">
        <div class="progress-bar" id="char_progress">0%</div>
      </div>
      <div class="character-grid" id="character_grid">
        <!-- 动态生成角色卡片 -->
      </div>
      <button class="btn btn-secondary" onclick="confirmCharacters()" id="btn_confirm_chars" style="display: none;">确认角色</button>
    </section>

    <!-- Step 4: 场景图 -->
    <section id="step4" class="section">
      <h2>🎨 Step 4: AI生成场景图</h2>
      <div class="progress-container">
        <div class="progress-bar" id="scene_progress">0%</div>
      </div>
      <div class="scene-grid" id="scene_grid">
        <!-- 动态生成场景卡片 -->
      </div>
      <button class="btn btn-secondary" onclick="confirmScenes()" id="btn_confirm_scenes" style="display: none;">确认场景</button>
    </section>

    <!-- Step 5: 视频生成 -->
    <section id="step5" class="section">
      <h2>🎥 Step 5: AI生成视频片段</h2>
      <div class="progress-container">
        <div class="progress-bar" id="video_progress">0%</div>
      </div>
      <div class="log-area" id="video_log"></div>
      <button class="btn btn-secondary" onclick="confirmVideos()" id="btn_confirm_videos" style="display: none;">确认视频</button>
    </section>

    <!-- Step 6: 成片 -->
    <section id="step6" class="section">
      <h2>🎞️ Step 6: AI拼接成片</h2>
      <div class="progress-container">
        <div class="progress-bar" id="compile_progress">0%</div>
      </div>
      <div id="final_video" style="margin-top: 20px; display: none;">
        <h3>最终成片：</h3>
        <video controls style="width: 100%; max-width: 800px; margin: 0 auto; display: block;">
          <source src="" type="video/mp4">
          您的浏览器不支持视频播放
        </video>
        <button class="btn btn-primary" onclick="downloadVideo()">下载视频</button>
      </div>
    </section>

    <footer style="text-align: center; padding: 30px 0; color: #666; font-size: 0.85em;">
      <p>东哥短剧生成器 © 2026 | 由 Agnes AI + Hermes Agent 驱动</p>
    </footer>
  </div>

  <script>
    // 全局状态
    let currentStep = 1;
    let scriptData = null;
    let characters = [];
    let scenes = [];
    let videos = [];
    
    // 步骤导航
    function updateSteps() {
      document.querySelectorAll('.step').forEach((el, i) => {
        el.classList.remove('active', 'completed');
        if (i + 1 < currentStep) el.classList.add('completed');
        if (i + 1 === currentStep) el.classList.add('active');
      });
      
      document.querySelectorAll('.section').forEach((el, i) => {
        el.classList.remove('active');
        if (i + 1 === currentStep) el.classList.add('active');
      });
    }
    
    // 开始生成
    async function startGeneration() {
      const genre = document.getElementById('genre').value;
      const direction = document.getElementById('story_direction').value;
      
      if (!direction) {
        alert('请输入故事方向');
        return;
      }
      
      currentStep = 2;
      updateSteps();
      
      // 根据用户输入动态生成内容
      await generateScript(direction, genre);
    }
    
    // 根据输入生成剧本
    async function generateScript(direction, genre) {
      const logArea = document.getElementById('script_log');
      const progressBar = document.getElementById('script_progress');
      logArea.innerHTML = '<div class="log-entry info">🤖 AI正在分析故事方向...</div>';
      
      // 模拟API调用
      for (let i = 0; i <= 100; i += 10) {
        progressBar.style.width = `${i}%`;
        progressBar.textContent = `${i}%`;
        await new Promise(resolve => setTimeout(resolve, 300));
      }
      
      // 根据输入动态生成标题和内容
      const genreMap = {
        'urban_fantasy': '都市奇幻',
        'rebirth': '重生爽文', 
        'ceo_romance': '霸总甜宠',
        'suspense': '悬疑推理',
        'cartoon': '3D卡通动画',
        'custom': '自定义'
      };
      
      const title = `${direction.split(' ')[0]} ${genreMap[genre]}短剧`;
      const sceneCount = 12;
      
      scriptData = {
        title: title,
        genre: genre,
        direction: direction,
        scenes: Array.from({length: sceneCount}, (_, i) => ({
          id: i + 1,
          title: `第${i + 1}场`,
          description: `这是根据"${direction}"生成的第${i + 1}场戏的内容...`
        }))
      };
      
      logArea.innerHTML += `<div class="log-entry success">✅ 剧本生成完成！</div>
                           <div class="log-entry info">📋 标题: ${scriptData.title}</div>
                           <div class="log-entry info">🎭 类型: ${genreMap[genre]}</div>
                           <div class="log-entry info">📝 方向: ${scriptData.direction}</div>
                           <div class="log-entry info">🎬 场景数: ${scriptData.scenes.length}</div>`;
      
      document.getElementById('btn_confirm_script').style.display = 'inline-block';
    }
    
    // 确认剧本
    function confirmScript() {
      currentStep = 3;
      updateSteps();
      generateCharacters();
    }
    
    // 生成角色
    async function generateCharacters() {
      const grid = document.getElementById('character_grid');
      const progressBar = document.getElementById('char_progress');
      grid.innerHTML = '';
      
      // 根据剧本生成角色
      const charCount = scriptData ? 4 : 3; // 默认4个角色
      const charNames = scriptData ? 
        Array.from({length: charCount}, (_, i) => `主角${String.fromCharCode(65+i)}`) : 
        ['角色A', '角色B', '角色C'];
      
      charNames.forEach((name, index) => {
        const card = document.createElement('div');
        card.className = 'character-card';
        card.innerHTML = `
          <img src="https://via.placeholder.com/300x200/5C3317/fff?text=${encodeURIComponent(name)}" alt="${name}">
          <h3>${name}</h3>
          <p>角色设定生成中...</p>
        `;
        grid.appendChild(card);
      });
      
      // 模拟进度
      for (let i = 0; i <= 100; i += 20) {
        progressBar.style.width = `${i}%`;
        progressBar.textContent = `${i}%`;
        await new Promise(resolve => setTimeout(resolve, 500));
      }
      
      document.querySelectorAll('.character-card p').forEach(p => {
        p.textContent = '✅ 角色设定已完成';
        p.style.color = '#4CAF50';
      });
      
      document.getElementById('btn_confirm_chars').style.display = 'inline-block';
    }
    
    // 确认角色
    function confirmCharacters() {
      currentStep = 4;
      updateSteps();
      generateScenes();
    }
    
    // 生成场景
    async function generateScenes() {
      const grid = document.getElementById('scene_grid');
      const progressBar = document.getElementById('scene_progress');
      grid.innerHTML = '';
      
      if (!scriptData) return;
      
      scriptData.scenes.forEach(scene => {
        const card = document.createElement('div');
        card.className = 'scene-card';
        card.innerHTML = `
          <div class="status pending">待生成</div>
          <img src="https://via.placeholder.com/300x150/228B22/fff?text=Scene+${scene.id}" alt="场景${scene.id}">
          <div class="info">
            <strong>场景 ${scene.id}</strong>
            <p>${scene.title}</p>
          </div>
        `;
        grid.appendChild(card);
      });
      
      // 模拟进度
      for (let i = 0; i <= 100; i += 10) {
        progressBar.style.width = `${i}%`;
        progressBar.textContent = `${i}%`;
        await new Promise(resolve => setTimeout(resolve, 300));
        
        // 更新场景状态
        const statusElements = document.querySelectorAll('.scene-card .status');
        const completedCount = Math.floor((i / 100) * statusElements.length);
        statusElements.forEach((status, idx) => {
          if (idx < completedCount) {
            status.textContent = '✅ 完成';
            status.className = 'status complete';
          }
        });
      }
      
      document.getElementById('btn_confirm_scenes').style.display = 'inline-block';
    }
    
    // 确认场景
    function confirmScenes() {
      currentStep = 5;
      updateSteps();
      generateVideos();
    }
    
    // 生成视频
    async function generateVideos() {
      const logArea = document.getElementById('video_log');
      const progressBar = document.getElementById('video_progress');
      logArea.innerHTML = '<div class="log-entry info">🤖 AI开始生成视频片段...</div>';
      
      // 模拟视频生成
      for (let i = 1; i <= 12; i++) {
        logArea.innerHTML += `<div class="log-entry info">生成场景 ${i} 的视频...</div>`;
        const progress = Math.round((i / 12) * 100);
        progressBar.style.width = `${progress}%`;
        progressBar.textContent = `${progress}%`;
        
        await new Promise(resolve => setTimeout(resolve, 500));
        logArea.innerHTML += `<div class="log-entry success">✅ 场景 ${i} 视频生成完成</div>`;
      }
      
      document.getElementById('btn_confirm_videos').style.display = 'inline-block';
    }
    
    // 确认视频
    function confirmVideos() {
      currentStep = 6;
      updateSteps();
      compileVideo();
    }
    
    // 拼接视频
    async function compileVideo() {
      const progressBar = document.getElementById('compile_progress');
      
      // 模拟拼接过程
      for (let i = 0; i <= 100; i += 5) {
        progressBar.style.width = `${i}%`;
        progressBar.textContent = `${i}%`;
        await new Promise(resolve => setTimeout(resolve, 300));
      }
      
      document.getElementById('final_video').style.display = 'block';
      // 这里应该指向实际生成的视频文件
      document.querySelector('#final_video video source').src = 'output.mp4';
    }
    
    // 下载视频
    function downloadVideo() {
      const link = document.createElement('a');
      link.href = 'output.mp4';
      link.download = scriptData ? `${scriptData.title.replace(/\s+/g, '_')}.mp4` : 'output.mp4';
      link.click();
    }
    
    // 初始化
    updateSteps();
  </script>
</body>
</html>
